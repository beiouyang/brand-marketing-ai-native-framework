        }

          previewMode,
          workflowStatus,

          draftTag: { ...draftTag }

        if (sharedChannelRef.current) sharedChannelRef.current.postMessage(shared);

        if (/复用|类似|沿用/.test(text)) return "复用标签";
        if (/查|查询|在哪|有哪些|状态/.test(text)) return "查询标签";
        return "新增标签";
      }

        const type = inferTaskType(task.intentText);
        setTask(current => ({ ...current, type, confidence: type === "新增标签" ? 92 : 86, stepIndex: 0 }));

        setActivePage("flow");

          "复用标签": "我想复用百亿补贴的标签样式"

        setTask(current => ({ ...current, type, intentText: examples[type], confidence: type === "新增标签" ? 92 : 86, stepIndex: 0 }));
        setActivePage("flow");

      function nextStep() {
        if (task.stepIndex < currentSteps.length - 1) {
          setTaskPatch({ stepIndex: task.stepIndex + 1 });
          if (["生成方案", "预览生成方案"].includes(currentSteps[task.stepIndex + 1])) setWorkflowStatus("待评审");
          return;
        }
        setWorkflowStatus("待评审");
        setActivePage("preview");
      }

      function prevStep() {
        setTaskPatch({ stepIndex: Math.max(0, task.stepIndex - 1) });
      }

        if (currentStepName.includes("定位")) updateDraft("touchPoint", "价格区域");

        if (currentStepName.includes("配置")) applyStyle("STYLE_PROMO_RED_CAPSULE");
      }

      function applyStyle(styleId) {
        const style = tagStyles.find(item => item.styleId === styleId);
        if (!style) return;
        setDraftTag(current => ({
          ...current,
          styleId: style.styleId,
          tagType: style.tagType === "促销" ? "价格/促销" : style.tagType,
          shape: style.shape,
          bgColor: style.backgroundColor,
          textColor: style.textColor,
          fontSize: style.fontSize,
          radius: style.radius
        }));
      }

      function inferKnowledgeSlot() {
        const text = `${task.intentText} ${draftTag.tagName} ${draftTag.tagType} ${draftTag.touchPoint}`;
        const matched = knowledgeBase.pointSlots.find(slot => slot.tags && slot.tags.some(tag => text.includes(tag)));
        if (matched) return matched;
        if (/价保|质保|退换|服务|保障/.test(text)) return knowledgeBase.pointSlots.find(slot => slot.id === "POINT_03") || selectedKnowledgeSlot;
        if (/物流|配送|达|发货|履约/.test(text)) return knowledgeBase.pointSlots.find(slot => slot.id === "POINT_06") || selectedKnowledgeSlot;
        if (/店铺|旗舰|粉丝|好评|榜/.test(text)) return knowledgeBase.pointSlots.find(slot => slot.id === "POINT_09") || selectedKnowledgeSlot;
        if (/自营|全球购|平台/.test(text)) return knowledgeBase.pointSlots.find(slot => slot.id === "POINT_01") || selectedKnowledgeSlot;
        return selectedKnowledgeSlot;
      }

        if (status === "在线") return "green";
        if (status === "待评审" || status === "草稿") return "orange";
        if (status === "已下线") return "default";
        return "blue";

      function riskColor(risk) {
        if (risk === "高") return "red";
        if (risk === "中") return "orange";
        return "green";

        return h(Row, { gutter: [16, 16] },
          h(Col, { xs: 24, xl: 12 }, h(Card, { title: "标签治理导图", extra: h(Tag, { color: "purple" }, "管理视角") },
            h(Paragraph, { type: "secondary" }, "治理导图不作为普通用户主流程入口。它用于产品负责人查看标签迭代管理链路、产品功能框架、MVP 覆盖与后续缺口。"),
            h(Timeline, { items: [
              { color: "blue", children: "标签迭代管理链路：诉求 → 资产 → 判断 → 生产 → 监控 → 回流。" },
              { color: "orange", children: "产品功能框架：资产库、触点中心、诉求工作台、冲突检测、低代码搭建器、状态监控。" },
              { color: "green", children: "实时同步：当前主线任务、标签、触点、状态会同步到 localStorage 与 BroadcastChannel。" }
            ] })
          )),
          h(Col, { xs: 24, xl: 12 }, h(Card, { title: "为什么从主流程降级" }, h(Paragraph, { type: "secondary" }, "普通用户的真实目标是完成标签增删改查，不是理解平台架构。治理导图适合作为产品把控、方案评审和平台规划工具。")))
        );
      }

      function generateMarkdown() {
        const standardSlot = inferKnowledgeSlot();
        return `# ${draftTag.tagName} 标签方案

## 产品目标
${draftTag.businessGoal}

## 基础信息
- 任务类型：${task.type}
- 展示页面：${draftTag.page}
- 展示触点：${draftTag.touchPoint}
- 标签类型：${draftTag.tagType}
- 当前状态：${workflowStatus}

## 规则与冲突
- 商品条件：${draftTag.targetGoods}
- 用户条件：${draftTag.targetUsers}
- 生效时间：${draftTag.timeRange}
- 互斥标签：${draftTag.excludeTags}
- 优先级：${draftTag.priority}

## 样式
- 文案：${draftTag.text}
- 样式名称：${currentStyle.styleName}
- 形态：${currentStyle.shape}
- 背景色：${currentStyle.backgroundColor}
- 字体色：${currentStyle.textColor}
- 字号：${currentStyle.fontSize}px
- 圆角：${currentStyle.radius}px

## 设计依据
- 标签样式来源：${currentStyle.source}
- 商详触点来源：${currentTouchRule ? currentTouchRule.source : designSources.detailDesign}
- 触点承载规则：${currentTouchRule ? currentTouchRule.conflictPolicy : "按商详触点规则展示"}

## 标准知识库依据
- 适用点位：点位${standardSlot.index} ${standardSlot.name}
- 点位位置：${standardSlot.position}
- 标签类型：${standardSlot.type}
- 展示规则：${standardSlot.displayRules && standardSlot.displayRules[0] ? standardSlot.displayRules[0] : standardSlot.displayCount}
- 冲突规则：${standardSlot.conflictRules && standardSlot.conflictRules[0] ? standardSlot.conflictRules[0] : "按标准知识库规则判断"}
- 方案判断依据：${standardSlot.definition}

## 测试用例
- 命中活动商品时展示 ${draftTag.text}
- 同时命中 ${draftTag.excludeTags} 时优先展示 ${draftTag.excludeTags}
- 未命中活动商品时不展示
- 价格区域容量满时按降级策略处理`;
      }

      async function copyMarkdown() {
        await navigator.clipboard.writeText(generateMarkdown());
        message.success("已复制方案");
      }

      function downloadMarkdown() {
        const blob = new Blob([generateMarkdown()], { type: "text/markdown;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${draftTag.tagName}-标签方案.md`;
        a.click();
        URL.revokeObjectURL(url);
      }

      function renderDecisionBasis() {
        const standardSlot = inferKnowledgeSlot();
        return h(Space, { direction: "vertical", size: 16, style: { display: "flex" } },
          h(Alert, { showIcon: true, type: "success", message: "依据来源", description: "商详标签标准规范、Relay 标签设计方案、Relay 商详设计方案，以及历史任务沉淀结果。" }),
          h(Descriptions, { bordered: true, column: 1, size: "small", items: [
            { key: "style", label: "样式来源", children: `${currentStyle.styleName} · ${currentStyle.source}` },
            { key: "touch", label: "触点规则", children: currentTouchRule ? currentTouchRule.conflictPolicy : "按商详触点规则展示" },
            { key: "standard", label: "知识库点位", children: `点位${standardSlot.index} ${standardSlot.name}` }
          ] })
        );
      }
    }

    ReactDOM.createRoot(document.getElementById("root")).render(h(App));
  </script>
</body>
</html>
