<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设计案例库</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#111;--ink2:#555;--ink3:#999;
  --paper:#F7F6F3;--surface:#fff;--line:rgba(0,0,0,.08);--line2:rgba(0,0,0,.05);
  --green:#0AAD48;--green-dim:#E1F5EE;
  --gold:#B5691A;--gold-dim:#FDF0E0;
  --purple:#6B63D8;--purple-dim:#EEECFB;
  --red:#E8271B;--amber:#C47B00;--amber-dim:#FDF5E0;
  --r:10px;--r-sm:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'DM Sans',-apple-system,'PingFang SC',sans-serif;
  background:var(--paper);color:var(--ink);
  -webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;
}

/* TOPBAR */
.topbar{
  flex-shrink:0;
  background:rgba(247,246,243,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  padding:0 20px;height:52px;
  display:flex;align-items:center;gap:12px;
  z-index:100;
}
.logo{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;white-space:nowrap}
.logo-mark{width:22px;height:22px;border-radius:5px;background:var(--ink);display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:12px;height:12px}
.divider-v{width:1px;height:18px;background:var(--line);flex-shrink:0}
.search-wrap{flex:1;max-width:320px;position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink3);pointer-events:none}
#search{
  width:100%;height:32px;border:1px solid var(--line);border-radius:8px;
  padding:0 10px 0 32px;font-family:inherit;font-size:13px;color:var(--ink);
  background:var(--surface);outline:none;transition:border-color .15s;
}
#search:focus{border-color:rgba(0,0,0,.25)}
#search::placeholder{color:var(--ink3)}
.filters{display:flex;gap:4px;align-items:center}
.filter-btn{
  height:28px;padding:0 12px;border:1px solid var(--line);border-radius:20px;
  font-family:inherit;font-size:12px;color:var(--ink2);background:transparent;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.filter-btn:hover{background:var(--surface);border-color:rgba(0,0,0,.2)}
.filter-btn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.count-badge{font-size:12px;color:var(--ink3);font-family:'DM Mono',monospace;margin-left:auto;white-space:nowrap}

/* BODY */
.body-wrap{flex:1;display:flex;overflow:hidden}

/* SIDEBAR */
.sidebar{
  width:172px;flex-shrink:0;
  padding:16px 10px;
  border-right:1px solid var(--line);
  overflow-y:auto;
}
.sidebar-label{font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);padding:0 8px;margin-bottom:4px;margin-top:12px}
.sidebar-label:first-child{margin-top:0}
.sidebar-item{
  display:flex;align-items:center;gap:7px;
  padding:5px 8px;border-radius:var(--r-sm);
  font-size:12px;color:var(--ink2);
  cursor:pointer;transition:all .12s;
  border:1px solid transparent;
}
.sidebar-item:hover{background:var(--surface);color:var(--ink)}
.sidebar-item.active{background:var(--surface);color:var(--ink);border-color:var(--line);font-weight:500}
.s-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.s-count{margin-left:auto;font-size:10px;color:var(--ink3);font-family:'DM Mono',monospace}

/* MAIN SCROLL */
.main-scroll{flex:1;overflow-y:auto;padding:18px 20px}
.section-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.section-title{font-size:12px;font-weight:500;color:var(--ink2);white-space:nowrap}
.section-line{flex:1;height:1px;background:var(--line)}
.section-count{font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace}
.section-wrap{margin-bottom:28px}

/* GRID — 竖向设计稿用更窄的列 */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:10px;
}

/* CARD */
.card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--r);
  overflow:hidden;
  cursor:pointer;
  transition:transform .18s cubic-bezier(.2,.8,.2,1),box-shadow .18s;
  display:flex;flex-direction:column;
  animation:fadeUp .25s both;
}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* 统一缩略图容器 — 竖向比例 */
.card-thumb{
  width:100%;
  aspect-ratio:4/3;
  background:var(--paper);
  position:relative;overflow:hidden;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.card-thumb img{
  position:absolute;inset:0;
  width:100%;height:100%;object-fit:cover;
  object-position:top left;
  transition:transform .3s;
}
.card:hover .card-thumb img{transform:scale(1.04)}
/* 无截图占位 — 不显示文字，只显示图标 */
.no-img-placeholder{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:var(--paper);
}
.no-img-placeholder svg{width:28px;height:28px;opacity:.2;color:var(--ink3)}
/* 平台角标 */
.card-plat{
  position:absolute;top:7px;right:7px;
  font-size:10px;font-weight:500;letter-spacing:.02em;
  padding:2px 6px;border-radius:20px;
  backdrop-filter:blur(6px);
}
.plat-App{background:rgba(225,245,238,.92);color:#085041}
.plat-PC{background:rgba(241,239,232,.92);color:#444}
.plat-Both{background:rgba(238,237,254,.92);color:#3C3489}
/* NEW角标 */
.card-new{
  position:absolute;top:7px;left:7px;
  font-size:10px;font-weight:500;
  padding:2px 6px;border-radius:20px;
  background:var(--ink);color:#fff;
}

/* 卡片信息区 */
.card-body{padding:9px 10px 10px;display:flex;flex-direction:column;gap:5px}
.card-name{font-size:12px;font-weight:500;line-height:1.4;color:var(--ink)}
.card-area{font-size:10px;color:var(--ink3)}
.card-tags{display:flex;gap:3px;flex-wrap:wrap}
.tag{font-size:10px;padding:1px 5px;border-radius:4px;border:1px solid var(--line);color:var(--ink2);background:var(--paper);white-space:nowrap}
.card-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:6px;border-top:1px solid var(--line2);
  margin-top:2px;
}
.card-date{font-size:9px;color:var(--ink3);font-family:'DM Mono',monospace}
.card-link{
  font-size:10px;color:var(--purple);font-weight:500;
  display:flex;align-items:center;gap:2px;text-decoration:none;
}
.card-link:hover{text-decoration:underline}

/* 空状态 */
.empty-state{grid-column:1/-1;padding:48px 20px;text-align:center;font-size:13px;color:var(--ink3)}

/* ── PANEL ── */
.overlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.25);backdrop-filter:blur(2px);
}
.overlay.open{display:block}
.panel{
  position:fixed;right:0;top:0;bottom:0;
  width:min(520px,100vw);
  background:var(--surface);
  border-left:1px solid var(--line);
  z-index:201;
  transform:translateX(100%);
  transition:transform .26s cubic-bezier(.2,.8,.2,1);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.panel.open{transform:translateX(0)}

.panel-head{
  padding:14px 18px;border-bottom:1px solid var(--line);
  display:flex;align-items:flex-start;gap:10px;flex-shrink:0;
}
.panel-head-info{flex:1;min-width:0}
.panel-name{font-size:15px;font-weight:500;line-height:1.35;margin-bottom:5px}
.panel-meta{display:flex;gap:5px;flex-wrap:wrap}
.meta-pill{font-size:10px;padding:2px 8px;border-radius:10px}
.panel-close{
  width:28px;height:28px;flex-shrink:0;
  border:1px solid var(--line);border-radius:var(--r-sm);
  background:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink2);transition:background .12s;
}
.panel-close:hover{background:var(--paper)}

/* 面板滚动区 */
.panel-body{flex:1;overflow-y:auto;padding:16px 18px}

/* 截图容器 — 竖向，支持全屏 */
.panel-shot-wrap{
  width:100%;margin-bottom:14px;
  position:relative;border-radius:var(--r-sm);overflow:hidden;
  border:1px solid var(--line);background:var(--paper);
  height:260px;
  touch-action:none;
}
.panel-shot-wrap img{
  width:100%;height:100%;display:block;
  object-fit:cover;object-position:top left;
}
.shot-fullscreen{
  position:absolute;bottom:8px;right:8px;
  width:28px;height:28px;border-radius:6px;
  background:rgba(255,255,255,.9);backdrop-filter:blur(4px);
  border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .12s;color:var(--ink2);
}
.shot-fullscreen:hover{background:#fff}

.panel-sec{margin-bottom:14px}
.panel-sec-title{
  font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
  color:var(--ink3);margin-bottom:6px;
}
.panel-text{font-size:13px;color:var(--ink2);line-height:1.65}
.panel-relay{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;color:var(--purple);font-weight:500;
  padding:5px 11px;border:1px solid var(--purple-dim);border-radius:var(--r-sm);
  text-decoration:none;transition:background .12s;
}
.panel-relay:hover{background:var(--purple-dim)}
.panel-table{width:100%;border-collapse:collapse;font-size:12px}
.panel-table th{
  text-align:left;padding:5px 8px;
  border-bottom:1px solid var(--line);
  font-size:10px;font-weight:500;color:var(--ink3);letter-spacing:.03em;
}
.panel-table td{padding:6px 8px;border-bottom:1px solid var(--line2);color:var(--ink2);vertical-align:top;line-height:1.5}
.panel-table tr:last-child td{border-bottom:none}
.star-row td{background:#fffbe6}
.pattern-row{font-size:12px;padding:5px 0;border-bottom:1px solid var(--line2);color:var(--ink2)}
.pattern-row:last-child{border-bottom:none}
.related-chip{
  display:inline-flex;align-items:center;
  font-size:11px;padding:3px 9px;
  border:1px solid var(--line);border-radius:20px;
  color:var(--ink2);cursor:pointer;margin:2px;
  transition:all .12s;
}
.related-chip:hover{background:var(--paper);border-color:var(--ink3)}

/* 全屏图片查看器 */
.fullscreen-viewer{
  display:none;position:fixed;inset:0;z-index:400;
  background:rgba(0,0,0,.92);
  align-items:center;justify-content:center;
  cursor:zoom-out;
  touch-action:pinch-zoom;
  overflow:auto;
}
.fullscreen-viewer.open{display:flex}
.fullscreen-viewer img{
  max-width:90vw;max-height:90vh;
  object-fit:contain;border-radius:4px;
  cursor:default;
  touch-action:pinch-zoom;
}
.fv-close{
  position:fixed;top:20px;right:20px;
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#fff;transition:background .15s;
}
.fv-close:hover{background:rgba(255,255,255,.25)}
</style>
</head>

  <div class="panel-body" id="p-body"></div>
</div>

<!-- 全屏查看器 -->
<div class="fullscreen-viewer" id="fv" onclick="closeFV()">

</div>

var curPlat='all',curArea='all',curTag='',curSearch='';

function filtered(){
  return CASES.filter(function(c){
    var p=curPlat==='all'||c.platform===curPlat;
    var a=curArea==='all'||(curArea==='promotion'&&c.area==='promotion')||(curArea==='trade-in'&&c.area==='trade-in');
    var t=!curTag||c.keywords.some(function(k){return k.includes(curTag)});
    var s=!curSearch||c.name.includes(curSearch)||c.keywords.some(function(k){return k.includes(curSearch)});
    return p&&a&&t&&s;
  });
}

function renderCard(c,idx){
  var thumb=c.screenshot
    ?'<img src="'+c.screenshot+'" alt="" loading="lazy">'
    :'<div class="no-img-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>';
  var tags=c.keywords.slice(0,3).map(function(k){return'<span class="tag">'+k+'</span>'}).join('');
  var link=c.relay
    ?'<a class="card-link" href="'+c.relay+'" target="_blank" onclick="event.stopPropagation()"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>设计稿</a>'
    :'';
  return'<div class="card" onclick="openPanel('+c.id+')" style="animation-delay:'+idx*.025+'s">'
    +'<div class="card-thumb">'
      +thumb
      +(c.isNew?'<div class="card-new">NEW</div>':'')
      +'<div class="card-plat plat-'+c.platform+'">'+c.platform+'</div>'
    +'</div>'
    +'<div class="card-body">'
      +'<div class="card-name">'+c.name+'</div>'
      +'<div class="card-area">pdp / '+c.area+'</div>'
      +'<div class="card-tags">'+tags+'</div>'
      +'<div class="card-footer">'
        +'<span class="card-date">'+c.updated+'</span>'
        +link
      +'</div>'
    +'</div>'
  +'</div>';
}

function renderGrid(){
  var items=filtered();
  document.getElementById('count-badge').textContent=items.length+' cases';
  var promo=items.filter(function(c){return c.area==='promotion'});
  var trade=items.filter(function(c){return c.area==='trade-in'});
  var html='';
  var idx=0;
  if(promo.length){
    html+='<div class="section-wrap"><div class="section-hd"><span class="section-title">商详 · 促销组件</span><div class="section-line"></div><span class="section-count">'+promo.length+'</span></div>';
    html+='<div class="grid">'+promo.map(function(c){return renderCard(c,idx++)}).join('')+'</div></div>';
  }
  if(trade.length){
    html+='<div class="section-wrap"><div class="section-hd"><span class="section-title">商详 · 以旧换新</span><div class="section-line"></div><span class="section-count">'+trade.length+'</span></div>';
    html+='<div class="grid">'+trade.map(function(c){return renderCard(c,idx++)}).join('')+'</div></div>';
  }
  if(!items.length) html='<div class="empty-state">没有找到匹配的案例</div>';
  document.getElementById('main').innerHTML=html;
}

function openPanel(id){
  var c=CASES.find(function(x){return x.id===id});if(!c)return;
  document.getElementById('p-name').textContent=c.name;
  var meta='<span class="meta-pill" style="background:'+(c.platform==='App'?'var(--green-dim);color:#085041':c.platform==='PC'?'var(--paper);color:var(--ink2)':'var(--purple-dim);color:var(--purple)')+'">'+c.platform+'</span>';
  meta+='<span class="meta-pill" style="background:var(--paper);color:var(--ink2)">pdp / '+c.area+'</span>';
  meta+='<span class="meta-pill" style="background:var(--paper);color:var(--ink3)">'+c.updated+'</span>';
  document.getElementById('p-meta').innerHTML=meta;
  var body='';
  if(c.screenshot){
    body+='<div class="panel-shot-wrap"><img src="'+c.screenshot+'" alt="">'
      +'<div class="shot-fullscreen" onclick="openFV(\''+c.screenshot+'\')" title="全屏查看">'
        +'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>'
      +'</div></div>';
  }
  if(c.relay){
    body+='<div class="panel-sec"><a class="panel-relay" href="'+c.relay+'" target="_blank"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>在 Relay 中查看设计稿</a></div>';
  }
  if(c.background){
    body+='<div class="panel-sec"><div class="panel-sec-title">需求背景</div><div class="panel-text" style="color:var(--ink3)">'+c.background+'</div></div>';
  }
  body+='<div class="panel-sec"><div class="panel-sec-title">核心举措</div><div class="panel-text">'+c.core+'</div></div>';
  if(c.states&&c.states.length){
    body+='<div class="panel-sec"><div class="panel-sec-title">状态覆盖</div><table class="panel-table"><tr><th>状态</th><th>视觉处理</th></tr>';
    c.states.forEach(function(s){body+='<tr'+(s.s?' class="star-row"':'')+'><td>'+s.n+'</td><td>'+s.v+'</td></tr>'});
    body+='</table></div>';
  }
  if(c.patterns&&c.patterns.length){
    body+='<div class="panel-sec"><div class="panel-sec-title">可复用模式</div>';
    c.patterns.forEach(function(p){body+='<div class="pattern-row">'+p+'</div>'});
    body+='</div>';
  }
  if(c.keywords&&c.keywords.length){
    body+='<div class="panel-sec"><div class="panel-sec-title">关键词</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:2px">';
    c.keywords.forEach(function(k){body+='<span class="tag">'+k+'</span>'});
    body+='</div></div>';
  }
  if(c.related&&c.related.length){
    body+='<div class="panel-sec"><div class="panel-sec-title">关联案例</div><div style="margin-top:4px">';
    c.related.forEach(function(rid){
      var r=CASES.find(function(x){return x.id===rid});
      if(r)body+='<span class="related-chip" onclick="openPanel('+rid+')">'+r.name+'</span>';
    });
    body+='</div></div>';
  }
  document.getElementById('p-body').innerHTML=body;
  document.getElementById('p-body').scrollTop=0;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
  // 锁定主页滚动
  document.getElementById('main-scroll').style.overflow='hidden';
}

function closePanel(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
  document.getElementById('main-scroll').style.overflow='auto';
}

function openFV(src){
  document.getElementById('fv-img').src=src;
  document.getElementById('fv').classList.add('open');
}
function closeFV(){document.getElementById('fv').classList.remove('open')}

function setPlatform(p,btn){
  curPlat=p;
  document.querySelectorAll('.filters .filter-btn').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');renderGrid();
}
function setArea(a,el){
  curArea=a;curTag='';
  document.querySelectorAll('.sidebar-item').forEach(function(b){b.classList.remove('active')});
  el.classList.add('active');renderGrid();
}
function setTag(t){
  curTag=curTag===t?'':t;curArea='all';
  document.querySelectorAll('.sidebar-item').forEach(function(b){b.classList.remove('active')});
  renderGrid();
}
function applyFilter(){curSearch=document.getElementById('search').value.trim();renderGrid();}

document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    if(document.getElementById('fv').classList.contains('open'))closeFV();
    else closePanel();
  }
});
renderGrid();
</script>
