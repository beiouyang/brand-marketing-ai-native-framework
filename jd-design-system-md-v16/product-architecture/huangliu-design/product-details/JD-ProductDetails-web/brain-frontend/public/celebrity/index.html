<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>明星挂件审核工具 - 静态预览</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { background: #0c1324; }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 4px; }
    </style>
  </head>
  <body class="bg-[#0c1324] text-slate-100">
    <main class="min-h-screen px-5 py-6">
      <header class="mx-auto mb-6 max-w-[1680px] border-b border-white/10 pb-5">
        <p class="text-sm font-semibold text-red-400">京东 APP 商品详情页</p>
        <h1 class="mt-2 text-3xl font-bold text-slate-50">明星挂件审核工具</h1>
        <p class="mt-2 max-w-3xl text-sm leading-6 text-slate-400">
          静态预览版，可直接上传图片体验本地审核、问题可视化、效果图预览和 JSON 导出。
        </p>
      </header>

      <div class="mx-auto grid max-w-[1680px] gap-5 xl:grid-cols-[320px_minmax(520px,1fr)_390px]">
        <section class="rounded-2xl border border-white/10 bg-white/[0.04] p-5 shadow-lg shadow-black/20 backdrop-blur-sm">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">素材上传</p>
              <h2 class="mt-1 text-lg font-semibold text-slate-100">明星透明底 PNG</h2>
            </div>
            <span class="rounded-full bg-white/10 px-3 py-1 text-xs font-medium text-slate-300">168 × 138</span>
          </div>
          <label class="mt-5 flex min-h-48 cursor-pointer flex-col items-center justify-center rounded-xl border border-dashed border-white/15 bg-white/[0.03] px-4 text-center transition-colors hover:border-cyan-400/40 hover:bg-cyan-400/10">
            <span class="text-4xl text-slate-500">⇧</span>
            <span class="mt-3 text-sm font-semibold text-slate-200">上传 PNG 图片</span>
            <span class="mt-1 text-xs text-slate-500">也可选择 JPG 来查看格式错误示例</span>

          </label>

        </section>

        <section class="space-y-5">
          <section class="rounded-2xl border border-white/10 bg-white/[0.04] p-5 shadow-lg shadow-black/20 backdrop-blur-sm">
            <div class="flex items-center justify-between">

                <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">效果图预览</p>
                <h2 class="mt-1 text-lg font-semibold text-slate-100">本地模板自动合成</h2>
              </div>
              <button id="refreshBtn" class="h-9 rounded-lg border border-white/15 px-3 text-sm font-semibold text-slate-200 transition-colors hover:bg-white/5">刷新预览</button>
            </div>
            <div class="mt-5 grid gap-4 lg:grid-cols-2">
              <div class="rounded-xl border border-white/10 p-4">
                <div class="mb-3 flex items-center justify-between">
                  <div>
                    <h3 class="text-sm font-semibold text-slate-100">白天收起态</h3>
                    <p class="mt-1 text-xs text-slate-500">整页模板 + 圆形照片容器</p>

                    <img class="block w-full" src="assets/detail-collapsed-light-template.png" alt="白天收起态模板" />
                    <div class="absolute overflow-hidden rounded-full" style="left:86.76%;top:80.19%;width:11.2%;aspect-ratio:1/1">
                      <img id="collapsedLightImg" class="hidden absolute top-0 h-full max-w-none" style="width:121.74%;left:-10.87%" alt="明星挂件素材" />
                    </div>
                  </div>
                </div>
              </div>
              <div class="rounded-xl border border-white/10 p-4">
                <div class="mb-3 flex items-center justify-between">
                  <div>
                    <h3 class="text-sm font-semibold text-slate-100">白天展开态</h3>
                    <p class="mt-1 text-xs text-slate-500">整页模板 + 左下角裁切</p>
                  </div>
                  <button data-export="expanded" class="rounded-md border border-white/15 px-2 py-1 text-xs font-semibold text-slate-200 transition-colors hover:bg-white/5">PNG</button>
                </div>
                <div class="relative mx-auto h-[260px] max-w-[220px] overflow-hidden rounded-lg border border-white/10 bg-slate-100">
                  <div class="relative w-full" style="aspect-ratio:1125/2574;transform:translateY(-280px)">
                    <img class="block w-full" src="assets/detail-expanded-light-template.png" alt="白天展开态模板" />
                    <div class="absolute overflow-hidden" style="left:53.24%;top:79.56%;width:14.93%;aspect-ratio:168/138;border-radius:0 0 0 43.48%">
                      <img id="expandedLightImg" class="hidden h-full w-full object-fill" alt="明星挂件素材" />
                    </div>
                  </div>
                </div>
              </div>
              <div class="rounded-xl border border-white/10 p-4">
                <div class="mb-3 flex items-center justify-between">
                  <div>
                    <h3 class="text-sm font-semibold text-slate-100">黑夜收起态</h3>
                    <p class="mt-1 text-xs text-slate-500">暗黑模式整页模板</p>
                  </div>
                  <button data-export="collapsed-dark" class="rounded-md border border-white/15 px-2 py-1 text-xs font-semibold text-slate-200 transition-colors hover:bg-white/5">PNG</button>
                </div>
                <div class="relative mx-auto h-[260px] max-w-[220px] overflow-hidden rounded-lg border border-white/10 bg-slate-950">
                  <div class="relative w-full" style="aspect-ratio:1125/2574;transform:translateY(-280px)">
                    <img class="block w-full" src="assets/detail-collapsed-dark-template.png" alt="黑夜收起态模板" />
                    <div class="absolute overflow-hidden rounded-full" style="left:86.76%;top:80.19%;width:11.2%;aspect-ratio:1/1">
                      <img id="collapsedDarkImg" class="hidden absolute top-0 h-full max-w-none" style="width:121.74%;left:-10.87%" alt="明星挂件素材" />
                    </div>
                  </div>
                </div>
              </div>
              <div class="rounded-xl border border-white/10 p-4">
                <div class="mb-3 flex items-center justify-between">
                  <div>
                    <h3 class="text-sm font-semibold text-slate-100">黑夜展开态</h3>
                    <p class="mt-1 text-xs text-slate-500">暗黑模式整页模板</p>
                  </div>
                  <button data-export="expanded-dark" class="rounded-md border border-white/15 px-2 py-1 text-xs font-semibold text-slate-200 transition-colors hover:bg-white/5">PNG</button>
                </div>
                <div class="relative mx-auto h-[260px] max-w-[220px] overflow-hidden rounded-lg border border-white/10 bg-slate-950">
                  <div class="relative w-full" style="aspect-ratio:1125/2574;transform:translateY(-280px)">
                    <img class="block w-full" src="assets/detail-expanded-dark-template.png" alt="黑夜展开态模板" />
                    <div class="absolute overflow-hidden" style="left:53.24%;top:79.56%;width:14.93%;aspect-ratio:168/138;border-radius:0 0 0 43.48%">
                      <img id="expandedDarkImg" class="hidden h-full w-full object-fill" alt="明星挂件素材" />
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section class="rounded-2xl border border-white/10 bg-white/[0.04] p-5 shadow-lg shadow-black/20 backdrop-blur-sm">
            <div class="mb-4 flex items-center justify-between">
              <div>
                <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">商品详情页模拟</p>
                <h2 class="mt-1 text-lg font-semibold text-slate-100">京东 APP 场景预览</h2>
              </div>
              <button data-export="detail" class="h-9 rounded-lg border border-white/15 px-3 text-sm font-semibold text-slate-200 transition-colors hover:bg-white/5">导出效果图 PNG</button>
            </div>
            <div id="phone" class="relative mx-auto max-w-[390px] overflow-hidden rounded-lg border border-white/10 bg-[#f5f5f5]">
              <img class="block w-full" src="assets/detail-expanded-light-template.png" alt="商品详情页展开态模板" />
              <div id="passTip" class="absolute left-4 right-4 top-4 z-20 hidden rounded-md border border-green-500/30 bg-green-500/15 px-3 py-2 text-xs font-semibold text-green-300">
                审核通过，可立即查看最终上线效果
              </div>
              <div class="absolute z-20 overflow-hidden" style="left:53.24%;top:79.56%;width:14.93%;aspect-ratio:168/138;border-radius:0 0 0 43.48%">
                <img id="detailImg" class="hidden h-full w-full object-fill" alt="明星挂件素材" />
              </div>
            </div>
          </section>
        </section>

        <section class="rounded-2xl border border-white/10 bg-white/[0.04] p-5 shadow-lg shadow-black/20 backdrop-blur-sm">
          <div class="flex items-start justify-between">
            <div>
              <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">审核结果</p>
              <h2 class="mt-1 text-lg font-semibold text-slate-100">自动审核结论</h2>
            </div>
            <span id="conclusion" class="rounded-full bg-amber-500/15 px-3 py-1 text-sm font-semibold text-amber-300 ring-1 ring-amber-500/30">需补充素材</span>
          </div>
          <div class="mt-5 grid grid-cols-2 gap-3">
            <div class="rounded-lg bg-white/[0.04] p-3"><p class="text-xs text-slate-500">是否需要人工判断</p><p id="manual" class="mt-1 font-semibold text-slate-100">不需要</p></div>
            <div class="rounded-lg bg-white/[0.04] p-3"><p class="text-xs text-slate-500">当前素材完整度</p><p id="complete" class="mt-1 font-semibold text-slate-100">0%</p></div>
          </div>
          <div class="mt-5 flex flex-col gap-2">
            <button id="exportJson" class="h-10 rounded-lg bg-[#22d3ee] px-3 text-sm font-semibold text-slate-900 transition hover:brightness-110">导出审核结果 JSON</button>
            <button data-export="detail" class="h-10 rounded-lg border border-white/15 px-3 text-sm font-semibold text-slate-200 transition-colors hover:bg-white/5">导出效果图 PNG</button>
          </div>
          <h3 class="mt-6 text-sm font-semibold text-slate-100">问题列表</h3>
          <div id="issues" class="mt-3 space-y-3"></div>
          <h3 class="mt-6 text-sm font-semibold text-slate-100">修改建议</h3>
          <div id="suggestions" class="mt-3 space-y-2"></div>
        </section>
      </div>
    </main>

    <script>
      const state = { file: null, objectUrl: null, check: null, review: null };
      const required = { width: 168, height: 138 };
      const $ = (id) => document.getElementById(id);
      const pngSig = [0x89, 0x50, 0x4e, 0x47, 0x0d, 0x0a, 0x1a, 0x0a];

      $("fileInput").addEventListener("change", async (event) => {
        await handleFile(event.target.files[0]);
      });

      $("refreshBtn").addEventListener("click", renderAll);
      $("exportJson").addEventListener("click", exportJson);
      document.querySelectorAll("[data-export]").forEach((button) => {
        button.addEventListener("click", () => exportCanvas(button.dataset.export));
      });

      renderReview(null);

      async function handleFile(file) {
        if (state.objectUrl) URL.revokeObjectURL(state.objectUrl);
        state.file = file;
        state.check = await checkImage(file);
        state.review = reviewImage(state.check);
        renderAll();
      }

      async function checkImage(file) {
        if (!file) return null;
        const bytes = new Uint8Array(await file.arrayBuffer());
        const ext = file.name.split(".").pop().toLowerCase();
        const isPng = pngSig.every((b, i) => bytes[i] === b) && ext === "png";
        const hasAlphaChannel = isPng ? [4, 6].includes(bytes[25]) : null;
        const objectUrl = URL.createObjectURL(file);
        state.objectUrl = objectUrl;

        try {
          const img = await loadImage(objectUrl);
          const metrics = readMetrics(img);
          return {
            fileName: file.name,
            mimeType: file.type || "未知",
            extension: ext || "未知",
            isPng,
            canRead: true,
            width: img.naturalWidth,
            height: img.naturalHeight,
            hasAlphaChannel,
            hasTransparentPixels: metrics.hasTransparentPixels,
            objectUrl,
            subjectMetrics: metrics.subjectMetrics,
            uploadStatus: "已读取"
          };
        } catch (error) {
          return { fileName: file.name, mimeType: file.type || "未知", extension: ext || "未知", isPng, canRead: false, width: null, height: null, hasAlphaChannel, hasTransparentPixels: null, objectUrl: null, uploadStatus: "读取失败" };
        }
      }

      function reviewImage(check) {
        const issues = [];
        if (!check) {
          issues.push(issue("文件缺失", "高风险", "当前未上传明星透明底 PNG 素材，无法生成审核结论。", "请上传 1 张 168 × 138 的透明底 PNG 图片。", "未通过"));
          return result("需补充素材", issues, 0);
        }
        if (!check.isPng) issues.push(issue("格式错误", "高风险", `当前文件格式为 ${check.extension.toUpperCase()}，不符合透明底 PNG 上传要求。`, "请重新上传 PNG 格式的透明底图片。", "未通过"));
        if (check.width !== required.width || check.height !== required.height) issues.push(issue("分辨率错误", "高风险", `当前图片分辨率为 ${check.width || "-"} × ${check.height || "-"}，规范要求为 168 × 138。`, "请将图片调整为 168 × 138 后重新上传。", "未通过"));
        if (check.isPng && (!check.hasAlphaChannel || !check.hasTransparentPixels)) issues.push(issue("非透明底", "高风险", "当前 PNG 图片未检测到透明通道，不符合透明底要求。", "请导出带 alpha 通道的透明底 PNG。", "未通过"));
        const m = check.subjectMetrics;
        if (check.isPng && check.width === 168 && check.height === 138 && m) {
          if (!m.bbox || m.alphaCoverage < 0.1 || m.bbox.width < 58 || m.bbox.height < 70) issues.push(issue("主体过小", "中风险", "套入模板后，系统检测到人物主体占比偏小，收起态挂件识别度不足。", "请放大人物主体，确保小挂件中仍可识别。", "未通过"));
          if (m.edgeTouch) issues.push(issue("裁切异常", "中风险", "人物主体与画布边缘贴合，套入模板时可能出现裁切异常。", "请保留安全边距，避免头发、脸部、肩部或手臂贴边。", "未通过"));
          if (m.smallPreviewScore < 0.24) issues.push(issue("小尺寸不清晰", "中风险", "缩放到 42 × 42 收起态后，主体轮廓或明暗对比不足。", "请使用更清晰的原图，并提高人物主体对比度。", "未通过"));
        }
        return result(issues.length ? "需修改" : "通过", issues, Math.max(0, Math.round(((7 - issues.length) / 7) * 100)));
      }

      function issue(type, level, description, suggestion, status) {
        return { id: `${type}-${Math.random()}`, type, level, description, suggestion, status };
      }

      function result(conclusion, issues, completeness) {
        return { conclusion, issues, completeness, requiresManualReview: false, suggestions: issues.length ? [...new Set(issues.map((i) => i.suggestion))] : ["素材符合当前自动审核规则，可进入最终上线效果确认。"], checkedAt: new Date().toISOString() };
      }

      function readMetrics(img) {
        const canvas = document.createElement("canvas");
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        ctx.drawImage(img, 0, 0);
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        let transparent = 0, subject = 0, minX = canvas.width, minY = canvas.height, maxX = -1, maxY = -1;
        for (let y = 0; y < canvas.height; y++) {
          for (let x = 0; x < canvas.width; x++) {
            const a = data[(y * canvas.width + x) * 4 + 3];
            if (a < 255) transparent++;
            if (a > 24) { subject++; minX = Math.min(minX, x); minY = Math.min(minY, y); maxX = Math.max(maxX, x); maxY = Math.max(maxY, y); }
          }
        }
        const bbox = subject ? { x: minX, y: minY, width: maxX - minX + 1, height: maxY - minY + 1 } : null;
        return {
          hasTransparentPixels: transparent > 0,
          subjectMetrics: {
            alphaCoverage: subject / (canvas.width * canvas.height),
            bbox,
            edgeTouch: !!bbox && (bbox.x <= 1 || bbox.y <= 1 || bbox.x + bbox.width >= canvas.width - 1 || bbox.y + bbox.height >= canvas.height - 1),
            smallPreviewScore: subject / (canvas.width * canvas.height)
          }
        };
      }

      function renderAll() {
        renderInfo();
        renderImages();
        renderReview(state.review);
      }

      function renderInfo() {
        const c = state.check;
        $("fileInfo").innerHTML = [
          ["文件名", c?.fileName || "-"],
          ["文件格式", c ? `${c.extension.toUpperCase()} / ${c.mimeType}` : "-"],
          ["图片分辨率", c?.width ? `${c.width} × ${c.height}` : "-"],
          ["透明通道", c?.hasAlphaChannel && c?.hasTransparentPixels ? "已检测到透明底" : c ? "未检测到可用透明底" : "-"],
          ["上传状态", c?.uploadStatus || "未上传"]
        ].map(([k, v]) => `<div class="flex items-center justify-between rounded-md bg-white/[0.04] px-3 py-2"><span class="text-xs text-slate-500">${k}</span><span class="max-w-44 truncate text-right font-semibold text-slate-200">${v}</span></div>`).join("");
      }

      function renderImages() {
        ["collapsedLightImg", "expandedLightImg", "collapsedDarkImg", "expandedDarkImg", "detailImg"].forEach((id) => {
          const img = $(id);
          if (state.objectUrl) { img.src = state.objectUrl; img.classList.remove("hidden"); }
          else img.classList.add("hidden");
        });
        $("passTip").classList.toggle("hidden", state.review?.conclusion !== "通过");
      }

      function renderReview(review) {
        const r = review || result("需补充素材", [issue("文件缺失", "高风险", "当前未上传明星透明底 PNG 素材，无法生成审核结论。", "请上传 1 张 168 × 138 的透明底 PNG 图片。", "未通过")], 0);
        $("conclusion").textContent = r.conclusion;
        $("conclusion").className = `rounded-full px-3 py-1 text-sm font-semibold ring-1 ${r.conclusion === "通过" ? "bg-green-500/15 text-green-300 ring-green-500/30" : r.conclusion === "需修改" ? "bg-red-500/15 text-red-300 ring-red-500/30" : "bg-amber-500/15 text-amber-300 ring-amber-500/30"}`;
        $("manual").textContent = r.requiresManualReview ? "需要" : "不需要";
        $("complete").textContent = `${r.completeness}%`;
        $("issues").innerHTML = r.issues.length ? r.issues.map(renderIssue).join("") : `<div class="rounded-lg border border-green-500/30 bg-green-500/15 p-4 text-sm text-green-300">当前素材未发现自动审核问题。</div>`;
        $("suggestions").innerHTML = r.suggestions.map((s) => `<div class="rounded-md bg-white/[0.04] px-3 py-2 text-sm leading-6 text-slate-300">${s}</div>`).join("");
      }

      function renderIssue(i) {
        const level = i.level === "高风险" ? "bg-red-500/15 text-red-300 ring-red-500/30" : "bg-amber-500/15 text-amber-300 ring-amber-500/30";
        return `<article class="rounded-lg border border-white/10 bg-white/[0.04] p-4 shadow-sm">
          <div class="flex items-start justify-between gap-3"><div><p class="text-xs text-slate-500">问题类型</p><h3 class="mt-1 font-semibold text-slate-100">${i.type}</h3></div><span class="rounded-full px-2.5 py-1 text-xs font-semibold ring-1 ${level}">${i.level}</span></div>
          <div class="mt-4 space-y-3 text-sm leading-6 text-slate-300"><div><p class="text-xs font-medium text-slate-500">问题说明</p><p>${i.description}</p></div><div><p class="text-xs font-medium text-slate-500">修改建议</p><p>${i.suggestion}</p></div></div>
          <div class="mt-4 flex items-center justify-between border-t border-white/10 pt-3"><span class="text-xs font-medium text-slate-500">检查项状态</span><span class="rounded-full bg-red-500/15 px-2.5 py-1 text-xs font-semibold text-red-300 ring-1 ring-red-500/30">${i.status}</span></div>
        </article>`;
      }

      function exportJson() {
        const blob = new Blob([JSON.stringify({ material: state.check, review: state.review }, null, 2)], { type: "application/json" });
        download(URL.createObjectURL(blob), `明星挂件审核报告-${Date.now()}.json`);
      }

      function exportCanvas(mode) {
        const canvas = document.createElement("canvas");
        canvas.width = 1125;
        canvas.height = 2574;
        const ctx = canvas.getContext("2d");
        drawExport(ctx, mode).then(() => canvas.toBlob((blob) => download(URL.createObjectURL(blob), "明星挂件效果图.png")));
      }

      async function drawExport(ctx, mode) {
        const src = mode === "collapsed"
          ? "assets/detail-collapsed-light-template.png"
          : mode === "collapsed-dark"
            ? "assets/detail-collapsed-dark-template.png"
            : mode === "expanded-dark"
              ? "assets/detail-expanded-dark-template.png"
              : "assets/detail-expanded-light-template.png";
        const bg = await loadImage(src);
        ctx.drawImage(bg, 0, 0, 1125, 2574);
        if (mode === "collapsed" || mode === "collapsed-dark") await drawCollapsedExport(ctx);
        else await drawExpandedExport(ctx);
      }

      async function drawCollapsedExport(ctx) {
        if (!state.objectUrl) return;
        const img = await loadImage(state.objectUrl);
        const x = 976, y = 2064, size = 126, w = size * (168 / 138);
        ctx.save();
        ctx.beginPath();
        ctx.arc(x + size / 2, y + size / 2, size / 2, 0, Math.PI * 2);
        ctx.clip();
        ctx.drawImage(img, x + (size - w) / 2, y, w, size);
        ctx.restore();
      }

      async function drawExpandedExport(ctx) {
        if (!state.objectUrl) return;
        const img = await loadImage(state.objectUrl);
        const x = 599, y = 2048, w = 168, h = 138;
        ctx.save();
        roundCustom(ctx, x, y, w, h, { tl: 0, tr: 0, br: 0, bl: 60 });
        ctx.clip();
        ctx.drawImage(img, x, y, w, h);
        ctx.restore();
      }

      function round(ctx, x, y, w, h, r) {
        ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
      }

      function roundCustom(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r.tl, y);
        ctx.lineTo(x + w - r.tr, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
        ctx.lineTo(x + w, y + h - r.br);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
        ctx.lineTo(x + r.bl, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
        ctx.lineTo(x, y + r.tl);
        ctx.quadraticCurveTo(x, y, x + r.tl, y);
        ctx.closePath();
      }

      function loadImage(src) {
        return new Promise((resolve, reject) => { const img = new Image(); img.onload = () => resolve(img); img.onerror = reject; img.src = src; });
      }

      function download(url, name) {
        const a = document.createElement("a"); a.href = url; a.download = name; a.click(); URL.revokeObjectURL(url);
      }
    </script>
  </body>
